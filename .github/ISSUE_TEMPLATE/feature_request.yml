name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement. Please describe the problem you're trying to solve and your proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem does this solve? What use case motivates this request?
      placeholder: "I'm trying to... but currently..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe what you'd like to see implemented.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches? What are the trade-offs?
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, examples, or references that might help.
    validations:
      required: false
