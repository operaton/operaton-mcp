name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - name: Check license headers
        run: npm run check:license
      - name: Check commit messages
        if: github.event_name == 'pull_request'
        run: npx commitlint --config commitlint.config.ts --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}
      - run: npm run build
      - run: npm run test:unit && npm run test:smoke
